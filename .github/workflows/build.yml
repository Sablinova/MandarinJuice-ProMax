name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag to upload to'
        required: true
        default: 'promax-v1.0.0'
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, win-x64, osx-x64]
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET 10
        run: |
          wget https://dot.net/v1/dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 10.0 -InstallDir ./dotnet
          echo "${{ github.workspace }}/dotnet" >> $GITHUB_PATH

      - name: Publish
        run: |
          cd mandarin-juice-cli
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ../publish-${{ matrix.rid }}

      - name: Zip
        run: |
          cd publish-${{ matrix.rid }}
          if [ "${{ matrix.rid }}" = "linux-x64" ]; then
            zip -r ../mandarin-juice-promax.zip ./*
          else
            zip -r ../mandarin-juice-promax-${{ matrix.rid }}.zip ./*
          fi

      - name: Upload Release Asset (Workflow Dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.rid }}" = "linux-x64" ]; then
            gh release upload ${{ github.event.inputs.release_tag }} mandarin-juice-promax.zip --clobber
          else
            gh release upload ${{ github.event.inputs.release_tag }} mandarin-juice-promax-${{ matrix.rid }}.zip --clobber
          fi

      - name: Upload Release Asset (Tag Push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.rid }}" = "linux-x64" ]; then
            gh release upload ${{ github.ref_name }} mandarin-juice-promax.zip --clobber
          else
            gh release upload ${{ github.ref_name }} mandarin-juice-promax-${{ matrix.rid }}.zip --clobber
          fi
